{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-8">

            <h2 class="fw-bold">Business Reports</h2>

            <p class="text-muted">
                Download and manage business reports.
            </p>

        </div>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h1>📄</h1>

                    <h4>CSV Report</h4>

                    <p>Download all sales data.</p>

                    <button class="btn btn-primary">
                        Download CSV
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h1>📊</h1>

                    <h4>Excel Report</h4>

                    <p>Export dashboard to Excel.</p>

                    <button class="btn btn-success">
                        Download Excel
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h1>🖨</h1>

                    <h4>Print Report</h4>

                    <p>Generate printable report.</p>

                    <button class="btn btn-dark">
                        Print
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
