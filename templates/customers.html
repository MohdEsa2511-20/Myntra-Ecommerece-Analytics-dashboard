{% extends "base.html" %}

{% block title %}Customers{% endblock %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">Customer Analytics</h2>

    <div class="row">

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h4>Total Customers</h4>
                <h2>{{ customers }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h4>Average Rating</h4>
                <h2>{{ rating }}</h2>
            </div>
        </div>

    </div>

    <div class="card shadow mt-4">
        <div class="card-body">
            {{ customer_chart|safe }}
        </div>
    </div>

</div>

{% endblock %}
