{% extends "base.html" %}

{% block title %}Products{% endblock %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">Product Analytics</h2>

    <div class="row">

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5>Total Products</h5>
                <h2>{{ products }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5>Average Revenue</h5>
                <h2>₹ {{ avg_price }}</h2>
            </div>
        </div>

    </div>

    <div class="card shadow mt-4">
        <div class="card-body">
            {{ product_chart|safe }}
        </div>
    </div>

    <div class="card shadow mt-4">
        <div class="card-body">
            {{ pie_chart|safe }}
        </div>
    </div>

</div>

{% endblock %}
